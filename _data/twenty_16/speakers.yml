- title: Workshop Marketing & PR
  name: wkrshpmarkt-pr2025
  subtitle: Echipa Royal Engineers a participat la două workshop-uri susținute de domnul Chifu Daniel, unde am discutat despre concepte de bază din PR și marketing. Explicațiile au fost clare și ușor de urmărit, astfel încât toți membrii, inclusiv bobocii, să înțeleagă mai bine rolul acestor activități într-o echipă de robotică. <br> <i>Noiembrie 2025</i>
  img: wkrshpmarkt-pr2025.jpg
  thumbnail: wkrshpmarkt-pr2025.jpg
  alt: wkrshpmarkt-pr2025
  topic: Workshop Marketing & PR
  description: Echipa Royal Engineers a participat la două workshop-uri susținute de domnul Chifu Daniel, unde am discutat despre concepte de bază din PR și marketing. Explicațiile au fost clare și ușor de urmărit, astfel încât toți membrii, inclusiv bobocii, să înțeleagă mai bine rolul acestor activități într-o echipă de robotică. <br> Pe lângă partea teoretică, am avut și exerciții interactive, cum ar fi să prezentăm și să „vindem” o cafea sau un pix, pentru a înțelege mai bine cum să ne prezentăm ideile într-un mod simplu și convingător. Activitățile au fost relaxate, dar foarte utile, și ne-au ajutat să vedem cum putem arăta mai clar ce face echipa. <br> Workshop-urile ne-au ajutat să ne dăm seama cum să prezentăm activitatea echipei și cum să lucrăm mai bine la imaginea noastră. <br> Îi mulțumim domnului Chifu Daniel pentru timpul și experiența oferită! <br> <i>Noiembrie 2025</i>

- title: Robotica la orice vârstă
  name: wrkshpsclgimmrncost2025
  subtitle: Am avut ocazia de a vizita Școala Gimnazială ”Miron Costin” Suceava, unde am organizat un atelier interactiv dedicat elevilor pasionați de tehnologie și inovație! 🚀 <br> <i> 14-15 octombrie 2025 <i>
  img: wrkshpsclgimmrncost2025.jpg
  thumbnail: wrkshpsclgimmrncost2025.jpg
  alt: wrkshpsclgimmrncost2025
  topic: Robotica la orice vârstă
  description: Am avut ocazia de a vizita Școala Gimnazială ”Miron Costin” Suceava, unde am organizat un atelier interactiv dedicat elevilor pasionați de tehnologie și inovație! 🚀 <br> În cadrul atelierului, le-am introdus elevilor universul FIRST Tech Challenge, o competiție care combină știința, programarea și spiritul de echipă într-o experiență unică. 💡 Le-am explicat cum funcționează competițiile, ce presupune să faci parte dintr-o echipă de robotică și cum fiecare rol, de la programare până la design mecanic, contribuie la succesul final. Am prezentat robotul nostru, le-am arătat cum îl construim și programăm și am împărtășit povești din experiențele noastre de la competițiile FTC, unde pasiunea și munca în echipă fac diferența. <br> Am discutat și despre cum pot să se alăture și ei, în liceu, unui club de robotică și să devină parte dintr-o comunitate de tineri inovatori care învață, explorează și creează împreună. 👑✨ <br> <i> 14-15 octombrie 2025 <i>

- title: Noaptea Cercetătorilor 2025
  name: noaptea_cercetatorilor25
  subtitle: La Noaptea Cercetătorilor Europeni, am fost prezenți la Universitatea „Ștefan cel Mare” din Suceava, într-o atmosferă plină de energie, curiozitate și dorință de a descoperi. A fost o experiență aparte unde am avut ocazia să povestim despre robotul nostru, despre procesul din spatele construcției lui și despre provocările care ne-au pus la încercare răbdarea, creativitatea și spiritul de echipă. 💙 <br> <i> 26 septembrie 2025 </i>
  img: noapteacercetatorilor2025.jpg
  thumbnail: noapteacercetatorilor2025.jpg
  alt: noaptea_cercetatorilor25
  topic: Noaptea Cercetătorilor 2025
  description: La Noaptea Cercetătorilor Europeni, am fost prezenți la Universitatea „Ștefan cel Mare” din Suceava, într-o atmosferă plină de energie, curiozitate și dorință de a descoperi. A fost o experiență aparte unde am avut ocazia să povestim despre robotul nostru, despre procesul din spatele construcției lui și despre provocările care ne-au pus la încercare răbdarea, creativitatea și spiritul de echipă. 💙 <br> Ne-am bucurat să vedem oameni de toate vârstele interesați de ceea ce facem, de la copii fascinați de mișcările robotului, până la adulți care ne-au pus întrebări despre mecanisme, programare și planurile noastre de viitor. Fiecare reacție, fiecare întrebare și fiecare zâmbet ne-au reamintit cât de important este să împărtășim munca noastră și să inspirăm mai departe pasiunea pentru tehnologie. 🌙 <br> Ne bucurăm că am făcut parte dintr-un eveniment care aduce știința mai aproape de oameni și care îi ajută pe tineri să vadă că tehnologia nu este ceva de neatins, ci un domeniu în care poți crește pas cu pas, dacă ai răbdare și pasiune. ✨ <br> <i> 26 septembrie 2025 </i>

- title: Workshop septembrie 2025
  name: wrkshp2025oct
  subtitle: În data de 18 septembrie am avut ocazia să organizăm un workshop pentru a ne întâlni cu noii membri ai clubului de robotică Royal Engineers. 💙 <br> <i> 18 septembrie 2025 </i>
