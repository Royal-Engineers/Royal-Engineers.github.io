- title: Romanian National Championship
  name: natio2026
  subtitle: Participarea la etapa națională a competiției de robotică FTC România, desfășurată la București, a fost o experiență incredibilă și plină de provocări. 🤖 <br> <i> 13-15 martie 2026 </i>
  img: natio2026.jpeg
  thumbnail: natio2026.jpeg
  alt: natio2026
  topic: Romanian National Championship
  description: Participarea la etapa națională a competiției de robotică FTC România, desfășurată la București, a fost o experiență incredibilă și plină de provocări. 🤖 <br> Am avut ocazia să concurăm alături de unele dintre cele mai bune echipe de robotică din țară, să ne testăm limitele și să învățăm lucruri noi la fiecare meci. Chiar dacă am obținut locul 67, suntem mândri de parcursul nostru și de tot efortul depus până aici. <br> Mai presus de orice rezultat, această experiență ne-a arătat cât de important este să fim o echipă unită — să ne susținem, să lucrăm împreună și să nu renunțăm indiferent de obstacole. 💙 <br> Competiția ne-a motivat să devenim mai buni, mai ambițioși și mai pregătiți pentru provocările viitoare. 💪 <br> <i> 13-15 martie 2026 </i>

